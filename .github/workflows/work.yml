name: Compile Authentic Assets.car

on:
  workflow_dispatch:

jobs:
  modify-car:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository Files
      uses: actions/checkout@v4

    - name: Step 1 - Unpack and Map Folder Hierarchy
      run: python3 swap.py

    - name: Step 2 - Recompile Final Assets.car
      run: |
        mkdir final_output
        xcrun actool ./Assets.xcassets --compile ./final_output --platform iphoneos --minimum-deployment-target 15.0

    - name: Step 3 - Upload Modified Car File
      uses: actions/upload-artifact@v4
      with:
        name: Modified-Assets-File
        path: final_output/Assets.car
