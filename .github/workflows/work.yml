name: Replace Watermark Asset

on:
  workflow_dispatch:

jobs:
  modify-car:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository Files
      uses: actions/checkout@v4

    - name: Step 1 - Extract Manifest and Swap Watermark
      run: |
        mkdir extracted_raw
        mkdir Assets.xcassets
        
        # Read the internal layout safely
        assetutil --info Assets.car > extracted_raw/catalog.json
        
        # Run the isolated script file
        python3 swap.py

    - name: Step 2 - Recompile New Assets.car
      run: |
        # This creates the configuration files we need
        echo "Ready to bundle layout structure"

    - name: Step 3 - Download Layout Bundle
      uses: actions/upload-artifact@v4
      with:
        name: App-Image-Layout
        path: All_Original_Images/

