name: Extract Apple Assets
on:
  workflow_dispatch:

jobs:
  unpack_assets:
    runs-on: macos-latest
    
    steps:
      # Step 1: Copy your own repository files (Assets.car) into the workspace runner
      - name: Checkout Your Repository Content
        uses: actions/checkout@v4

      # Step 2: Use the native checkout block to fetch the tool source directly
      - name: Fetch Extractor Tool Source
        uses: actions/checkout@v4
        with:
          repository: 'bartoszj/acextract'
          submodules: 'recursive'
          path: tool-source

      # Step 3: Build using the repository's native Makefile layout
      - name: Build Local ARM64 Asset Extractor via Makefile
        run: |
          mkdir ExtractedAssets
          cd tool-source
          make

      # Step 4: Run the compiled executable binary file natively (acextract.bin)
      - name: Execute Native Extraction
        run: |
          ./tool-source/acextract.bin -i Assets.car -o ExtractedAssets

      # Step 5: Package everything into a zip bundle
      - name: Bundle into a Downloadable ZIP File
        run: |
          zip -r extracted_images.zip ExtractedAssets

      # Step 6: Post the package onto your GitHub web interface dashboard
      - name: Upload Output Assets to GitHub UI
        uses: actions/upload-artifact@v4
        with:
          name: Unpacked-Images-Archive
          path: extracted_images.zip
