name: Extract Assets via Samra

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-latest

    steps:
      # 1. Pull down your repository code containing Assets.car
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Download and unpack Samra
      # Using the official repository release package to skip code compilation
      - name: Download Samra Toolchain
        run: |
          curl -L -o Samra.zip https://github.com/NSAntoine/Samra/releases/download/1.4.1/Samra.app.zip
          unzip Samra.zip -d samra_app

      # 3. Trigger Samra's built-in extractutil command line tool
      - name: Extract Images
        run: |
          mkdir -p extracted_images
          
          # Target the hidden CLI binary nested inside the modern Samra app structure
          SAMRA_CLI="./samra_app/Samra.app/Contents/MacOS/extractutil"
          
          # Force execution safety permissions
          chmod +x "$SAMRA_CLI"
          
          # Run extraction: [binary] [input .car] [output directory]
          "$SAMRA_CLI" ./Assets.car extracted_images

      # 4. Package your extracted images for direct UI download
      - name: Upload Extracted Images Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samra-extracted-assets
          path: extracted_images/
          retention-days: 5
