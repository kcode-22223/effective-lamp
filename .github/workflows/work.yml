name: Extract Apple Assets
on:
  workflow_dispatch:

jobs:
  unpack_assets:
    runs-on: macos-latest
    
    steps:
      # Step 1: Copy your repository files (Assets.car) into the runner workspace
      - name: Checkout Your Repository Content
        uses: actions/checkout@v4

      # Step 2: Use Homebrew to download and install the native app bundle
      - name: Install Tool via Homebrew
        run: |
          mkdir ExtractedAssets
          brew install --cask asset-catalog-tinkerer

      # Step 3: Run the extraction using the exact syntax demanded by the tool
      - name: Execute Native Extraction via act
        run: |
          # Matches exactly: act extract --input <input> --output <output>
          "/Applications/Asset Catalog Tinkerer.app/Contents/MacOS/act" extract --input Assets.car --output ExtractedAssets

      # Step 4: Package everything into a zip bundle
      - name: Bundle into a Downloadable ZIP File
        run: |
          zip -r extracted_images.zip ExtractedAssets

      # Step 5: Post the package onto your GitHub web interface dashboard
      - name: Upload Output Assets to GitHub UI
        uses: actions/upload-artifact@v4
        with:
          name: Unpacked-Images-Archive
          path: extracted_images.zip
