name: Extract Assets from CAR File

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-latest

    steps:
      # 1. Pull down your repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Clone and build cartools directly from source (Fixed paths & scheme)
      - name: Clone and Compile cartools
        run: |
          git clone https://github.com
          cd cartools
          # Build the command-line target specifically using the workspace
          xcodebuild -workspace Cartools.xcworkspace -scheme cartooldt -configuration Release DBG_ROOT=/
          # Copy the compiled binary out of the build directory to the global path
          sudo cp build/Release/cartooldt /usr/local/bin/cartool

      # 3. Create the output folder and run the extraction
      # Replace 'path/to/Assets.car' with the actual path inside your repository
      - name: Extract Images
        run: |
          mkdir -p extracted_images
          cartool path/to/Assets.car extracted_images

      # 4. Save your extracted images so you can download them from the UI
      - name: Upload Extracted Images Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted-assets-png
          path: extracted_images/
          retention-days: 5
