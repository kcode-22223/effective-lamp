name: Extract Assets via Native CoreUI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-latest

    steps:
      # 1. Pull down your repository code containing Assets.car
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Compile and run an inline Objective-C script
      # Replaces 'allAssetNames' with 'allImageNames' to align with modern CoreUI signatures
      - name: Extract Images Natively
        run: |
          mkdir -p extracted_images
          
          cat << 'EOF' > extract.m
          #import <Foundation/Foundation.h>
          #import <AppKit/AppKit.h>

          // Declare private CoreUI class interfaces so the compiler accepts them
          @interface CUICatalog : NSObject
          - (id)initWithURL:(NSURL *)url error:(NSError **)error;
          - (NSArray *)allImageNames; // Corrected modern private framework selector
          - (id)imageWithName:(NSString *)name scaleFactor:(double)scale;
          @end

          @interface CUINamedImage : NSObject
          - (CGImageRef)image;
          @end

          int main(int argc, const char * argv[]) {
              @autoreleasepool {
                  // Dynamically load Apple's native CoreUI framework
                  NSBundle *bundle = [NSBundle bundleWithPath:@"/System/Library/PrivateFrameworks/CoreUI.framework"];
                  if (![bundle load]) {
                      NSLog(@"Error: Failed to load CoreUI private framework.");
                      return 1;
                  }

                  NSString *currentDir = [[NSFileManager defaultManager] currentDirectoryPath];
                  NSURL *carURL = [NSURL fileURLWithPath:[currentDir stringByAppendingPathComponent:@"Assets.car"]];
                  NSString *outputPath = [currentDir stringByAppendingPathComponent:@"extracted_images"];

                  NSLog(@"Reading asset inventory from: %@", carURL.path);

                  NSError *error = nil;
                  CUICatalog *catalog = [[NSClassFromString(@"CUICatalog") alloc] initWithURL:carURL error:&error];
                  if (!catalog) {
                      NSLog(@"Error: Failed to open Asset catalog file: %@", error.localizedDescription);
                      return 1;
                  }

                  // Safe execution lookup with signature validation fallback
                  NSArray *names = nil;
                  if ([catalog respondsToSelector:@selector(allImageNames)]) {
                      names = [catalog allImageNames];
                  } else if ([catalog respondsToSelector:NSSelectorFromString(@"allAssetNames")]) {
                      names = [catalog performSelector:NSSelectorFromString(@"allAssetNames")];
                  }

                  NSLog(@"Discovered %lu assets within catalog file.", (unsigned long)names.count);

                  for (NSString *name in names) {
                      // Fetch asset structures at 2x retina asset scale factor
                      id namedImage = [catalog imageWithName:name scaleFactor:2.0];
                      if (namedImage && [namedImage respondsToSelector:@selector(image)]) {
                          CGImageRef cgImage = (CGImageRef)[namedImage performSelector:@selector(image)];
                          if (cgImage) {
                              NSBitmapImageRep *rep = [[NSBitmapImageRep alloc] initWithCGImage:cgImage];
                              NSData *data = [rep representationUsingType:NSBitmapImageFileTypePNG properties:@{}];
                              
                              if (data) {
                                  NSString *fileDest = [outputPath stringByAppendingPathComponent:[NSString stringWithFormat:@"%@.png", name]];
                                  [data writeToFile:fileDest atomically:YES];
                                  NSLog(@"Successfully extracted: %@.png", name);
                              }
                          }
                      }
                  }
              }
              return 0;
          }
          EOF

          # Compile the script with standard foundation frameworks
          clang -framework Foundation -framework AppKit -o extract_tool extract.m
          
          # Run the extraction binary
          ./extract_tool

      # 3. Save your extracted images so you can download them from the UI
      - name: Upload Extracted Images Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-extracted-assets
          path: extracted_images/
          retention-days: 5
