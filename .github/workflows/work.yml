name: Extract Assets from CAR File

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger via GitHub website UI

jobs:
  extract:
    runs-on: macos-latest # Required for CoreUI/Private framework execution

    steps:
      # 1. Pull down your repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up the cartool tool via Homebrew tap
      - name: Install cartool via Homebrew
        run: |
          brew tap showxu/tap
          brew install cartool

      # 3. Create the output folder and run the extraction
      # Replace 'path/to/Assets.car' with the actual path inside your repository
      - name: Extract Images
        run: |
          mkdir -p extracted_images
          cartool path/to/Assets.car extracted_images

      # 4. Save your extracted images so you can download them from the UI
      - name: Upload Extracted Images Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted-assets-png
          path: extracted_images/
          retention-days: 5
