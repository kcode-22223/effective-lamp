name: Extract Apple Assets
on:
  workflow_dispatch:

jobs:
  unpack_assets:
    runs-on: macos-latest
    
    steps:
      # Step 1: Copy your own repository files (Assets.car) into the runner workspace
      - name: Checkout Your Repository Content
        uses: actions/checkout@v4

      # Step 2: Install Asset Catalog Tinkerer cleanly via Homebrew Cask
      - name: Install Tool via Homebrew
        run: |
          mkdir ExtractedAssets
          # Installs the verified, compiled application bundle natively
          brew install --cask asset-catalog-tinkerer

      # Step 3: Run the CLI tool 'act' directly out of the installed application framework
      - name: Execute Native Extraction via act
        run: |
          # Calls the built-in binary inside the app's MacOS directory layout
          "/Applications/Asset Catalog Tinkerer.app/Contents/MacOS/act" export -i Assets.car -o ExtractedAssets

      # Step 4: Package everything into a zip bundle
      - name: Bundle into a Downloadable ZIP File
        run: |
          zip -r extracted_images.zip ExtractedAssets

      # Step 5: Post the package onto your GitHub web interface dashboard
      - name: Upload Output Assets to GitHub UI
        uses: actions/upload-artifact@v4
        with:
          name: Unpacked-Images-Archive
          path: extracted_images.zip
