name: Extract Assets from CAR File

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-latest

    steps:
      # 1. Pull down your repository code containing Assets.car
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Clone and build cartools using pure Swift Package Manager
      - name: Clone and Compile cartools
        run: |
          git clone https://github.com/showxu/cartools
          cd cartools
          # Build the command-line executable using native Swift PM
          swift build -c release --product cartooldt
          # Copy the binary out of the hidden swift build folder to global path
          sudo cp .build/release/cartooldt /usr/local/bin/cartool

      # 3. Create the output folder and run extraction from the root file
      - name: Extract Images
        run: |
          mkdir -p extracted_images
          cartool ./Assets.car extracted_images

      # 4. Save your extracted images so you can download them from the UI
      - name: Upload Extracted Images Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted-assets-png
          path: extracted_images/
          retention-days: 5
