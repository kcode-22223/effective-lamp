name: Compile Authentic Assets.car

on:
  workflow_dispatch:

jobs:
  modify-car:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository Files
      uses: actions/checkout@v4

    - name: Step 1 - Process Tinkerer Suffixes
      run: python3 swap.py

    - name: Step 2 - Recompile Original Raw Uncompressed Assets.car
      run: |
        mkdir final_output
        # Added explicit flag configurations to prevent raw texture compression loops entirely
        xcrun actool ./Assets.xcassets --compile ./final_output --platform iphoneos --target-device iphone --minimum-deployment-target 15.0 --optimization none --compress-pngs no --notices no --errors no --output-partial-info-plist ./final_output/partial.plist

    - name: Step 3 - Upload Modified Car File
      uses: actions/upload-artifact@v4
      with:
        name: Modified-Assets-File
        path: final_output/Assets.car
