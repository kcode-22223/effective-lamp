name: Extract Apple Assets
on:
  workflow_dispatch:

jobs:
  unpack_assets:
    runs-on: macos-latest
    
    steps:
      # Step 1: Copy your own repository files (Assets.car) into the runner workspace
      - name: Checkout Your Repository Content
        uses: actions/checkout@v4

      # Step 2: Use the native checkout block to fetch the tool source directly with submodules
      - name: Fetch Extractor Tool Source
        uses: actions/checkout@v4
        with:
          repository: 'bartoszj/acextract'
          submodules: 'recursive'
          path: tool-source

      # Step 3: Compile via Apple's native command-line builder (xcodebuild)
      - name: Compile via Xcode Build Engine
        run: |
          mkdir ExtractedAssets
          cd tool-source
          # Compiles the xcodeproj file natively into an executable binary
          xcodebuild -project acextract.xcodeproj -scheme acextract -configuration Release DSTROOT=./build install

      # Step 4: Run the newly compiled binary file directly
      - name: Execute Native Extraction
        run: |
          ./tool-source/build/usr/local/bin/acextract -i Assets.car -o ExtractedAssets

      # Step 5: Package everything into a zip bundle
      - name: Bundle into a Downloadable ZIP File
        run: |
          zip -r extracted_images.zip ExtractedAssets

      # Step 6: Post the package onto your GitHub web interface dashboard
      - name: Upload Output Assets to GitHub UI
        uses: actions/upload-artifact@v4
        with:
          name: Unpacked-Images-Archive
          path: extracted_images.zip
