name: Rebuild Custom Assets via Manifest & Zip

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-car:
    runs-on: macos-latest

    steps:
      # 1. Pull down your repository code containing catalog_manifest.json and modified_images.zip
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Unzip your updated images into a clean working directory
      - name: Unpack Modified Images
        run: |
          mkdir -p working_images_folder
          if [ ! -f "modified_images.zip" ]; then
            echo "Error: modified_images.zip not found in the root of the repository!"
            exit 1
          fi
          unzip modified_images.zip -d working_images_folder
          rm -rf working_images_folder/__MACOSX

      # 3. Dynamic Python Catalog Formatter with Substring Matching
      - name: Structure Catalog From Manifest JSON
        run: |
          python3 -c "
          import os, json, shutil

          manifest_path = 'catalog_manifest.json'
          source_folder = 'working_images_folder'
          catalog_dir = 'MockCatalog.xcassets'

          if not os.path.exists(manifest_path):
              print('Error: catalog_manifest.json not found!')
              exit(1)

          with open(manifest_path, 'r') as f:
              manifest = json.load(f)

          os.makedirs(catalog_dir, exist_ok=True)
          items = manifest if isinstance(manifest, list) else manifest.get('images', manifest.get('assets', []))

          # Get a clean list of files inside the unzipped folder
          unpacked_files = [f for f in os.listdir(source_folder) if not f.startswith('.')]

          for item in items:
              name = item.get('Name')
              uti = item.get('UTI', 'public.data')
              asset_type = item.get('AssetType', 'Data')
              
              if not name:
                  continue

              matched_source_file = None
              found_ext = None

              # Search using clean case-insensitive substring prefixes
              for filename in unpacked_files:
                  # Check if the file name starts exactly with the manifest token name
                  if filename.lower().startswith(name.lower()):
                      # Secure absolute file extension fallback handling (.gif, .png, etc.)
                      _, ext_part = os.path.splitext(filename.lower())
                      
                      # Keep looking if it is a secondary nested artifact
                      if ext_part in ['.png', '.gif', '.jpg', '.jpeg', '.data']:
                          matched_source_file = os.path.join(source_folder, filename)
                          found_ext = os.path.splitext(filename)[1] # Extract true extension case
                          break

              if not matched_source_file:
                  print(f'Warning: Missing or unmapped asset file for token: {name}')
                  continue

              # Assign asset types dynamically based on manifest definitions
              is_image = asset_type.lower() == 'image' or 'png' in uti or 'image' in uti
              set_ext = '.imageset' if is_image else '.dataset'
              target_set_dir = os.path.join(catalog_dir, f'{name}{set_ext}')
              os.makedirs(target_set_dir, exist_ok=True)

              # Format standard output names matching native deployment formats
              target_file_name = f'{name}{found_ext}'
              shutil.copy(matched_source_file, os.path.join(target_set_dir, target_file_name))

              contents = {
                  'info': {'version': 1, 'author': 'xcode'}
              }
              
              if is_image:
                  contents['images'] = [
                      {'idiom': 'universal', 'filename': target_file_name, 'scale': '1x'},
                      {'idiom': 'universal', 'scale': '2x'},
                      {'idiom': 'universal', 'scale': '3x'}
                  ]
              else:
                  contents['data'] = [
                      {'idiom': 'universal', 'filename': target_file_name, 'universal-type-identifier': uti}
                  ]

              with open(os.path.join(target_set_dir, 'Contents.json'), 'w') as out_f:
                  json.dump(contents, out_f, indent=2)

          print('Mapping completed! Suffix constraints bypassed successfully.')
          "

      # 4. Recompile the structured directory using Apple's official actool compiler
      - name: Compile Assets.car
        run: |
          mkdir -p output_compiled_car
          xcrun actool MockCatalog.xcassets \
            --compile output_compiled_car \
            --platform iphoneos \
            --minimum-deployment-target 15.0
            
      # 5. Save your rebuilt binary file so you can retrieve it from the UI
      - name: Upload Rebuilt Assets.car Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebuilt-production-car
          path: output_compiled_car/Assets.car
          retention-days: 5
