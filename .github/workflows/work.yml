name: Extract Apple Assets
on:
  workflow_dispatch:

jobs:
  unpack_assets:
    runs-on: macos-latest
    
    steps:
      # Step 1: Clone the repository files into the action workspace runner
      - name: Checkout Repository Content
        uses: actions/checkout@v4

      # Step 2: Download and compile the community cartool script natively
      - name: Setup Apple Cartool Extractor Engine
        run: |
          mkdir ExtractedAssets
          # Download the trusted cross-compiled utility
          curl -L "https://githubusercontent.com" -o main.m
          # Compile it instantly into a local macOS app container executable
          clang -framework Foundation -framework AppKit main.m -o cartool

      # Step 3: Run the extraction logic targeting your uploaded assets file
      - name: Extract Images from Asset Catalog Archive
        run: |
          ./cartool Assets.car ExtractedAssets

      # Step 4: Zip the directory contents securely
      - name: Bundle into a Downloadable ZIP File
        run: |
          zip -r extracted_images.zip ExtractedAssets

      # Step 5: Post the package onto the Actions artifact dashboard UI
      - name: Upload Output Assets to GitHub UI
        uses: actions/upload-artifact@v4
        with:
          name: Unpacked-Images-Archive
          path: extracted_images.zip
