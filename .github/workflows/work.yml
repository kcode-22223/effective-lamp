name: Extract Assets from CAR File

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-latest

    steps:
      # 1. Pull down your repository code containing Assets.car
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Download and unzip the pre-built macOS app package
      - name: Download Pre-built Release
        run: |
          curl -L -o release.zip https://github.com/showxu/cartools/releases/download/1.0.0-alpha/Final.Car.Pro.app.zip
          unzip release.zip -d extracted_app

      # 3. Target the CLI binary nested inside the .app bundle directory to extract images
      - name: Extract Images
        run: |
          mkdir -p extracted_images
          # Execute the hidden command line binary found inside the app structure
          ./extracted_app/Final.Car.Pro.app/Contents/MacOS/cartooldt ./Assets.car extracted_images

      # 4. Save your extracted images as a downloadable artifact
      - name: Upload Extracted Images Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted-assets-png
          path: extracted_images/
          retention-days: 5
