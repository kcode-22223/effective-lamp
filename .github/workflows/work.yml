name: Precise Watermark Swap

on:
  workflow_dispatch:

jobs:
  modify-car:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository Files
      uses: actions/checkout@v4

    - name: Step 1 - Native Mac Asset Extraction
      run: |
        mkdir extracted_assets
        # Clone the repository recursively to capture its required submodules
        git clone https://github.com/bartoszj/acextract.git --recursive
        cd acextract
        
        # Build using the project's native Makefile layout
        make
        cp acextract ../
        cd ../
        
        # Execute the compiled binary to extract your original layout images cleanly
        ./acextract -i Assets.car -o extracted_assets

    - name: Step 2 - Execute Python Swap
      run: python3 swap.py

    - name: Step 3 - Recompile Authentic Assets.car
      run: |
        mkdir final_output
        xcrun actool Assets.xcassets --compile final_output --platform iphoneos --minimum-deployment-target 15.0

    - name: Step 4 - Upload Modified Car File
      uses: actions/upload-artifact@v4
      with:
        name: Modified-Assets-File
        path: final_output/Assets.car
