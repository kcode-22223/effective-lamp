name: Extract Apple Assets
on:
  workflow_dispatch:

jobs:
  unpack_assets:
    runs-on: macos-latest
    
    steps:
      # Step 1: Copy your own repository files (Assets.car) into the runner workspace
      - name: Checkout Your Repository Content
        uses: actions/checkout@v4

      # Step 2: Download and unpack the official prebuilt zip directly from their raw folder
      - name: Fetch Pre-Compiled Tinkerer Tool
        run: |
          mkdir ExtractedAssets
          # Download the stable latest release bundle from your custom link
          curl -L "https://github.com/insidegui/AssetCatalogTinkerer/raw/main/releases/AssetCatalogTinkerer_latest.zip" -o tool.zip
          unzip tool.zip
          
          # Move the bundled 'act' CLI executable tool out of the app package to run it easily
          cp "Asset Catalog Tinkerer.app/Contents/MacOS/act" ./act
          chmod +x ./act

      # Step 3: Run the prebuilt utility directly
      - name: Execute Native Extraction via act
        run: |
          ./act export -i Assets.car -o ExtractedAssets

      # Step 4: Package everything into a zip bundle
      - name: Bundle into a Downloadable ZIP File
        run: |
          zip -r extracted_images.zip ExtractedAssets

      # Step 5: Post the package onto your GitHub web interface dashboard
      - name: Upload Output Assets to GitHub UI
        uses: actions/upload-artifact@v4
        with:
          name: Unpacked-Images-Archive
          path: extracted_images.zip
