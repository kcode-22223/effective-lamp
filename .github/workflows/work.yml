name: Extract Apple Assets
on:
  workflow_dispatch:

jobs:
  unpack_assets:
    runs-on: macos-latest
    
    steps:
      # Step 1: Copy your own repository files (Assets.car) into the runner workspace
      - name: Checkout Your Repository Content
        uses: actions/checkout@v4

      # Step 2: Use the native checkout block to fetch the Tinkerer tool source code
      - name: Fetch Asset Catalog Tinkerer Source
        uses: actions/checkout@v4
        with:
          repository: 'insidegui/AssetCatalogTinkerer'
          path: tool-source

      # Step 3: Use the perfect, working compilation command that succeeded in your screenshot
      - name: Compile Tinkerer CLI Tool
        run: |
          mkdir ExtractedAssets
          cd tool-source
          xcodebuild -project "Asset Catalog Tinkerer.xcodeproj" -scheme act -configuration Release DSTROOT=./build install

      # Step 4: Locate the compiled binary using wildcards directly out of Xcode's true output folder
      - name: Execute Native Extraction via act
        run: |
          # Finds the compiled 'act' binary inside Xcode's DerivedData install caches and executes it
          ~/Library/Developer/Xcode/DerivedData/Asset_Catalog_Tinkerer-*/Build/Intermediates.noindex/ArchiveIntermediates/act/InstallationBuildProductsLocation/usr/local/bin/act export -i Assets.car -o ExtractedAssets

      # Step 5: Package everything into a zip bundle
      - name: Bundle into a Downloadable ZIP File
        run: |
          zip -r extracted_images.zip ExtractedAssets

      # Step 6: Post the package onto your GitHub web interface dashboard
      - name: Upload Output Assets to GitHub UI
        uses: actions/upload-artifact@v4
        with:
          name: Unpacked-Images-Archive
          path: extracted_images.zip
