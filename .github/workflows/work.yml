name: Precise Watermark Swap

on:
  workflow_dispatch:

jobs:
  modify-car:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository Files
      uses: actions/checkout@v4

    - name: Step 1 - Native Structural Footprint Extraction
      run: |
        mkdir extracted_raw
        # Map the true database positions of the original 23.6MB binary layout natively
        assetutil --info Assets.car > extracted_raw/catalog.json

    - name: Step 2 - Process Image Swapping
      run: python3 swap.py

    - name: Step 3 - Recompile Authentic Assets.car
      run: |
        mkdir final_output
        # Target building the complete compiled binary archive package
        xcrun actool Assets.xcassets --compile final_output --platform iphoneos --minimum-deployment-target 15.0 --output-format binary

    - name: Step 4 - Upload Modified Car File
      uses: actions/upload-artifact@v4
      with:
        name: Modified-Assets-File
        path: final_output/Assets.car
