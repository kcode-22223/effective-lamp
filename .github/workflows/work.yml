name: Precise Watermark Swap

on:
  workflow_dispatch:

jobs:
  modify-car:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository Files
      uses: actions/checkout@v4

    - name: Step 1 - Execute Python Binary Patching
      run: python3 swap.py

    - name: Step 2 - Upload Authentic Modified File
      uses: actions/upload-artifact@v4
      with:
        name: Modified-Assets-File
        path: final_output/Assets.car
