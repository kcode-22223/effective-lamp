name: Extract Assets via Samra Source

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-latest

    steps:
      # 1. Pull down your repository code containing Assets.car
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # 2. Clone the Samra source repository files directly
       Pentesting
      - name: Clone Samra Source Repository
        run: |
          git clone --recursive https://github.com/NSAntoine/Samra
          
      # 3. Build and execute extractutil natively from source
      - name: Extract Images
        run: |
          mkdir -p extracted_images
          cd Samra
          
          # Use Swift run to compile the exact target shown in your image 
          # Arguments match lines 12-17 of the code snippet: <catalog-url> <directory-to-extract-to>
          swift run extractutil ../Assets.car ../extracted_images

      # 4. Save your extracted images so you can download them from the UI
      - name: Upload Extracted Images Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samra-extracted-assets
          path: extracted_images/
          retention-days: 5
