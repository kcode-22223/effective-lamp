name: Extract Apple Assets
on:
  workflow_dispatch:

jobs:
  unpack_assets:
    runs-on: macos-latest
    
    steps:
      # Step 1: Bring your own repository files (Assets.car) into the workspace runner
      - name: Checkout Your Repository Content
        uses: actions/checkout@v4
        with:
          path: main-repo

      # Step 2: Safely pull down the extractor tool code using a native action checkout block
      - name: Checkout Extractor Tool Source
        uses: actions/checkout@v4
        with:
          repository: 'bartoszj/acextract'
          submodules: 'recursive'
          path: tool-source

      # Step 3: Compile the native tool to match the ARM64 chip natively
      - name: Build Local ARM64 Asset Extractor
        run: |
          mkdir ExtractedAssets
          cd tool-source
          swift build -c release

      # Step 4: Run the freshly compiled tool natively 
      - name: Execute Native Extraction
        run: |
          ./tool-source/.build/release/acextract -i main-repo/Assets.car -o ExtractedAssets

      # Step 5: Package everything into a zip bundle
      - name: Bundle into a Downloadable ZIP File
        run: |
          zip -r extracted_images.zip ExtractedAssets

      # Step 6: Post the package onto your GitHub web interface dashboard
      - name: Upload Output Assets to GitHub UI
        uses: actions/upload-artifact@v4
        with:
          name: Unpacked-Images-Archive
          path: extracted_images.zip
