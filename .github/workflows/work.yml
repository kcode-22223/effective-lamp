name: Extract Apple Assets
on:
  workflow_dispatch:

jobs:
  unpack_assets:
    runs-on: macos-latest
    
    steps:
      # Step 1: Clone your own repository files (Assets.car) into the runner workspace
      - name: Checkout Your Repository Content
        uses: actions/checkout@v4

      # Step 2: Use Python to talk directly to the macOS core graphics system engine
      - name: Extract Images Natively via CoreUI
        run: |
          mkdir ExtractedAssets
          python3 - << 'EOF'
          import ctypes
          import os
          import sys

          # Load macOS's internal proprietary framework engine directly
          try:
              coreui = ctypes.cdll.LoadLibrary('/System/Library/PrivateFrameworks/CoreUI.framework/CoreUI')
              
              # Map Apple's private C decoding signatures
              coreui.CUIUnpackThemeStore.argtypes = [ctypes.c_char_p, ctypes.c_char_p]
              coreui.CUIUnpackThemeStore.restype = ctypes.c_bool
              
              car_file = b"Assets.car"
              out_directory = b"ExtractedAssets"
              
              print("Decoding proprietary asset catalog trees natively...")
              if coreui.CUIUnpackThemeStore(car_file, out_directory):
                  print("Success! Every image asset has been safely extracted.")
              else:
                  print("CoreUI engine returned a processing failure.")
                  sys.exit(1)
          except Exception as e:
              print(f"System Framework Binding Error: {e}")
              sys.exit(1)
          EOF

      # Step 3: Package everything into a zip bundle
      - name: Bundle into a Downloadable ZIP File
        run: |
          zip -r extracted_images.zip ExtractedAssets

      # Step 4: Post the package onto your GitHub web interface dashboard
      - name: Upload Output Assets to GitHub UI
        uses: actions/upload-artifact@v4
        with:
          name: Unpacked-Images-Archive
          path: extracted_images.zip
