name: Rebuild Assets.car

on:
  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rebuild:
    runs-on: macos-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files
        shell: bash
        run: |
          set -e

          test -f catalog_manifest.json
          test -f modified_images.zip
          test -f scripts/rebuild_assets.py

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract ZIP
        shell: bash
        run: |
          rm -rf working_images
          mkdir working_images

          unzip -q modified_images.zip -d working_images

          rm -rf working_images/__MACOSX

      - name: Build XCAssets
        shell: bash
        run: |
          python scripts/rebuild_assets.py

      - name: Show generated catalog
        shell: bash
        run: |
          echo "Generated assets:"
          find MockCatalog.xcassets

      - name: Compile Assets.car
        shell: bash
        run: |

          mkdir -p output

          xcrun actool \
            MockCatalog.xcassets \
            --compile output \
            --platform iphoneos \
            --target-device iphone \
            --target-device ipad \
            --minimum-deployment-target 15.0 \
            --warnings \
            --errors \
            --notices

      - name: Verify Assets.car
        shell: bash
        run: |

          if [ ! -f output/Assets.car ]; then
            echo "Assets.car was not generated."
            exit 1
          fi

          ls -lh output/Assets.car

      - name: Upload Assets.car
        uses: actions/upload-artifact@v4
        with:
          name: Assets.car
          path: output/Assets.car
          retention-days: 7

      - name: Upload XCAssets
        uses: actions/upload-artifact@v4
        with:
          name: XCAssets
          path: MockCatalog.xcassets
          retention-days: 7

      - name: Upload Build Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BuildOutput
          path: output
          retention-days: 7
