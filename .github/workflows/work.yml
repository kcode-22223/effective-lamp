name: Extract Apple Assets
on:
  workflow_dispatch:

jobs:
  unpack_assets:
    runs-on: macos-latest
    
    steps:
      # Step 1: Bring your uploaded files (Assets.car and acextract) into the workspace
      - name: Checkout Repository Content
        uses: actions/checkout@v4

      # Step 2: Set execution permissions
      - name: Grant Execution Permission
        run: |
          mkdir ExtractedAssets
          chmod +x acextract

      # Step 3: Force the Mac M-series runner to run the Intel binary via Rosetta translation
      - name: Execute Extraction via Translated Architecture
        run: |
          arch -x86_64 ./acextract -i Assets.car -o ExtractedAssets

      # Step 4: Zip everything up
      - name: Bundle into a Downloadable ZIP File
        run: |
          zip -r extracted_images.zip ExtractedAssets

      # Step 5: Post the file as a downloadable artifact
      - name: Upload Output Assets to GitHub UI
        uses: actions/upload-artifact@v4
        with:
          name: Unpacked-Images-Archive
          path: extracted_images.zip
