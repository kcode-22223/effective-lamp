name: Cartool Direct Extract Only

on:
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  extract-car:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository Files
      uses: actions/checkout@v4

    - name: Step 1 - Install Cartool via Homebrew
      run: |
        # Pulls the exact homebrew formula repository shown in your screenshot
        brew tap 0xxd0/tap
        brew install cartool

    - name: Step 2 - Execute Cartool Extract Sequence
      run: |
        mkdir extracted_assets_bundle
        # Extracts your real 23.6MB file cleanly into the target directory
        cartool Assets.car extracted_assets_bundle

    - name: Step 3 - Upload Entire Extracted Folder to Windows
      uses: actions/upload-artifact@v4
      with:
        name: Full-App-Assets-Extracted
        path: extracted_assets_bundle/
