name: Extract Apple Assets
on:
  workflow_dispatch:

jobs:
  unpack_assets:
    runs-on: macos-latest
    
    steps:
      # Step 1: Bring your uploaded Assets.car file into the runner environment
      - name: Checkout Repository Content
        uses: actions/checkout@v4

      # Step 2: Clone and compile the genuine native macOS tool
      - name: Build macOS Asset Extractor Tool
        run: |
          mkdir ExtractedAssets
          git clone https://github.com/bartoszj/acextract
          cd acextract
          swift build -c release

      # Step 3: Run the compiled utility against your catalog
      - name: Execute Extraction via Native Tool
        run: |
          ./tool-source/.build/release/acextract -i Assets.car -o ExtractedAssets

      # Step 4: Bundle the output directory into a single package
      - name: Bundle into a Downloadable ZIP File
        run: |
          zip -r extracted_images.zip ExtractedAssets

      # Step 5: Post the package onto your GitHub web interface dashboard
      - name: Upload Output Assets to GitHub UI
        uses: actions/upload-artifact@v4
        with:
          name: Unpacked-Images-Archive
          path: extracted_images.zip
