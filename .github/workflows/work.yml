name: Extract Apple Assets
on:
  workflow_dispatch:

jobs:
  unpack_assets:
    runs-on: macos-latest
    
    steps:
      # Step 1: Bring your uploaded Assets.car and acextract binary into the runner
      - name: Checkout Repository Content
        uses: actions/checkout@v4

      # Step 2: Restore the execution permission that Git stripped away
      - name: Grant Execution Permission
        run: |
          mkdir ExtractedAssets
          chmod +x acextract

      # Step 3: Run your repository's native binary against the catalog
      - name: Execute Extraction via Local Binary
        run: |
          ./acextract -i Assets.car -o ExtractedAssets

      # Step 4: Package everything into a zip bundle
      - name: Bundle into a Downloadable ZIP File
        run: |
          zip -r extracted_images.zip ExtractedAssets

      # Step 5: Post the package onto your GitHub web interface dashboard
      - name: Upload Output Assets to GitHub UI
        uses: actions/upload-artifact@v4
        with:
          name: Unpacked-Images-Archive
          path: extracted_images.zip
