name: Get Act Help Text
on:
  workflow_dispatch:

jobs:
  check_help:
    runs-on: macos-latest
    
    steps:
      - name: Install Tool via Homebrew
        run: |
          brew install --cask asset-catalog-tinkerer

      - name: Print Help Documentation
        run: |
          "/Applications/Asset Catalog Tinkerer.app/Contents/MacOS/act" --help
