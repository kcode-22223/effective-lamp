name: Cartool Direct Extract Only

on:
  workflow_dispatch:

jobs:
  extract-car:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository Files
      uses: actions/checkout@v4

    - name: Step 1 - Register, Trust, and Install Cartool
      run: |
        # 1. Tap the repository
        brew tap 0xxd0/tap
        
        # 2. Grant explicit trust to the formula so Homebrew allows execution
        brew trust --formula 0xxd0/tap/cartool
        
        # 3. Force installation while overriding Apple's compilation sandbox restriction
        brew install cartool

    - name: Step 2 - Execute Cartool Extract Sequence
      run: |
        mkdir extracted_resources
        # [INPUT PATH] -> Original 23.6MB file | [OUTPUT PATH] -> Extraction folder
        cartool ./Assets.car ./extracted_resources

    - name: Step 3 - Upload Entire Extracted Folder to Windows
      uses: actions/upload-artifact@v4
      with:
        name: Full-App-Assets-Extracted
        path: extracted_resources/
