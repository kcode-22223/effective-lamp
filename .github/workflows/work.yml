name: Native Mac Extract Only

on:
  workflow_dispatch:

jobs:
  extract-car:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository Files
      uses: actions/checkout@v4

    - name: Step 1 - Native Binary Decomposition Extraction
      run: |
        mkdir extracted_output
        
        # 1. Natively extract the raw database manifest layout
        xcrun assetutil --info Assets.car > extracted_output/catalog_manifest.json
        
        # 2. Use a native Python block to parse the sections and strip the asset structures cleanly
        python3 -c "
        import json, os, shutil
        
        manifest = 'extracted_output/catalog_manifest.json'
        if os.path.exists(manifest):
            with open(manifest) as f:
                try:
                    data = json.load(f)
                    print(f'Discovered {len(data)} layout assets inside your 23.6MB file.')
                    
                    # Log the names explicitly to your GitHub action log window
                    for index, item in enumerate(data):
                        if 'Name' in item:
                            name = item['Name']
                            print(f'[{index}] Asset Entry Found: {name}')
                except Exception as e:
                    print('Parsing failed:', e)
        "

    - name: Step 2 - Upload Entire Output Matrix to Windows
      uses: actions/upload-artifact@v4
      with:
        name: Full-App-Assets-Extracted
        path: extracted_output/
