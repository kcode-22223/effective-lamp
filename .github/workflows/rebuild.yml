name: Automate Samra Asset Replacement
on: [workflow_dispatch]

jobs:
  replace-asset:
    runs-on: macos-14
    steps:
      - name: Checkout Repository Files
        uses: actions/checkout@v4

      - name: Download and Install Samra App
        run: |
          curl -L -o Samra.zip https://github.com/NSAntoine/Samra/releases/download/1.4.1/Samra.app.zip
          unzip Samra.zip
          sudo mv Samra.app /Applications/

      - name: Execute AppleScript GUI Automation
        run: |
          # Launch Samra into the background Window Server
          open /Applications/Samra.app
          sleep 3

          osascript -e '
            tell application "System Events"
              tell process "Samra"
                set frontmost to true
                
                # 1. Open the original Assets.car file
                keystroke "o" using command down
                delay 1
                keystroke "'"$PWD"'/Assets.car"
                delay 0.5
                key code 36 -- (Press Enter)
                delay 4 -- Allow time for the catalog structure to load into the GUI

                tell window "Assets.car"
                  # 2. Click the Search bar at the top of Samra to isolate the watermark
                  # (Triggering Command+F focusing the search field natively)
                  keystroke "f" using command down
                  delay 0.5
                  
                  # Type the target asset name to filter the list view
                  keystroke "watermark"
                  delay 1.5

                  # 3. Select the filtered asset block from the UI layout
                  set targetRow to static text "watermark"
                  select targetRow
                  delay 1

                  # 4. Click the "Edit" button in the right-hand details pane
                  click button "Edit"
                  delay 1.5
                end tell

                # 5. Handle the native macOS file selection sheet
                # Open the "Go to folder" manual path entry block
                keystroke "G" using {command down, shift down}
                delay 1
                
                # Input the path to your new watermark file
                keystroke "'"$PWD"'/replacement_watermark.png"
                delay 0.5
                key code 36 -- (Press Enter to apply location)
                delay 1
                key code 36 -- (Press Enter a second time to confirm selection)
                delay 2

                # 6. Save changes cleanly back to the .car file structure
                keystroke "s" using command down
                delay 2
              end tell
            end tell
          '

      - name: Export Finished File Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebuilt-asset-catalog
          path: Assets.car
