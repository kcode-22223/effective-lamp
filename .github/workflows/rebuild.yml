name: Automate Samra Asset Replacement
on: [workflow_dispatch]

jobs:
  replace-asset:
    runs-on: macos-14
    steps:
      - name: Checkout Repository Files
        uses: actions/checkout@v4

      - name: Download and Install Latest Samra App
        run: |
          curl -L -o Samra.zip https://github.com/NSAntoine/Samra/releases/download/1.4.1/Samra.app.zip
          unzip Samra.zip
          sudo mv Samra.app /Applications/

      - name: Execute Robust Timing-Safe GUI Automation
        run: |
          killall Samra || true
          open /Applications/Samra.app
          sleep 5

          # Copy original Assets.car path to system clipboard
          echo -n "$PWD/Assets.car" | pbcopy

          osascript -e '
            tell application "System Events"
              tell process "Samra"
                set frontmost to true
                delay 1.5
                
                # 1. Clear the Welcome Screen
                key code 48 -- (Press Tab to highlight "Open Assets File")
                delay 0.5
                key code 49 -- (Press Spacebar to click it)
                delay 2
                
                # 2. Paste and open the original Assets.car file
                keystroke "G" using {command down, shift down}
                delay 2
                keystroke "v" using command down -- (Paste the catalog path)
                delay 1.5
                key code 36 -- (First Enter: Accept the path text)
                delay 1.0 -- Vital delay for layout transition
                key code 36 -- (Second Enter: Submit the dialog and open)
                
                # Allow ample time for Samra to index a massive asset binary
                delay 12 

                # 3. Filter down to the watermark element
                tell window 1
                  keystroke "f" using command down
                  delay 1.5
                  keystroke "watermark"
                  delay 4 -- Give search filtering time to settle

                  # Move focus out of search field and onto the filtered row item
                  key code 48 -- (Press Tab)
                  delay 1
                  key code 49 -- (Press Spacebar to highlight the target watermark row)
                  delay 2

                  # Tab twice to focus onto the "Edit" button inside the right pane
                  key code 48 -- (Press Tab)
                  delay 0.5
                  key code 48 -- (Press Tab)
                  delay 0.5
                  key code 49 -- (Press Spacebar to click Edit)
                  delay 3 -- Wait for the file picker panel sheet to completely deploy
                end tell

                # 4. Inject the new replacement image path via Clipboard
                do shell script "echo -n " & quoted form of "'"$PWD"'/replacement_watermark.png" & " | pbcopy"
                delay 1.5

                # Open manual folder location path panel inside picker sheet
                keystroke "G" using {command down, shift down}
                delay 2
                keystroke "v" using command down -- (Paste the watermark image path)
                delay 2.0 -- Essential pause: Let macOS catch up to the pasted text block

                # CRITICAL SEPARATION DELEYS FOR SELECTION PROMPT
                key code 36 -- (First Enter: Commits text entry array into directory navigation)
                delay 1.5 -- Crucial pause so macOS shifts visual focus out of the input pane
                key code 36 -- (Second Enter: Actively submits the target file selection choice)
                delay 6 -- Buffer window allowing Samra to safely rebuild internal data tables

                # 5. Save the updated binary layout
                keystroke "s" using command down
                delay 3
              end tell
            end tell
          '

      - name: Verify Output Modification
        run: |
          echo "=== SHA-256 CHECK ==="
          shasum -a 256 Assets.car

      - name: Export Finished File Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebuilt-asset-catalog
          path: Assets.car
