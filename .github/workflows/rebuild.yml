name: Stream Real Samra GUI to Browser
on: [workflow_dispatch]

jobs:
  launch-samra-desktop:
    runs-on: macos-14
    steps:
      - name: Checkout Repository Files
        uses: actions/checkout@v4

      - name: Download and Install Samra v1.4.1
        run: |
          curl -L -o Samra.zip https://github.com/NSAntoine/Samra/releases/download/1.4.1/Samra.app.zip
          unzip Samra.zip
          sudo mv Samra.app /Applications/

      - name: Install and Initialize Virtual Frame Display Engine
        run: |
          # 1. Install xquartz and x11 tools to provide a visual canvas framework
          brew install --cask xquartz || true
          brew install imwheel xdotool || true
          
          # 2. Spin up a persistent virtual display layout screen (1280x1024 resolution, 24-bit depth)
          Xvfb :1 -screen 0 1280x1024x24 &
          export DISPLAY=:1
          echo "DISPLAY=:1" >> $GITHUB_ENV

      - name: Configure Built-in macOS VNC Server
        run: |
          # 3. Force legacy VNC credentials on our newly created virtual display frame
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvnclegacy -vnclegacy yes

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpw -vncpw password123 \
            -restart -agent -privs -all

      - name: Launch Samra Workspace directly into Virtual Display
        run: |
          # 4. Launch Samra explicitly attached to our display layout channel so it renders visually
          DISPLAY=:1 open /Applications/Samra.app &
          sleep 3

      - name: Launch Web Proxy Display Tunnel
        run: |
          echo "================================================================="
          echo "👉 CONSOLE ACTION REQUIRED: COPY THE public tcp:// URL BELOW"
          echo "================================================================="
          
          ssh -p 443 \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -R 0:127.0.0.1:5900 \
            tcp@a.pinggy.io
