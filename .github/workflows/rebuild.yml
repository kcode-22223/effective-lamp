name: Automate Samra Asset Replacement
on: [workflow_dispatch]

jobs:
  replace-asset:
    runs-on: macos-14
    steps:
      - name: Checkout Repository Files
        uses: actions/checkout@v4

      - name: Download and Install Samra App
        run: |
          curl -L -o Samra.zip https://github.com/NSAntoine/Samra/releases/download/1.4.1/Samra.app.zip
          unzip Samra.zip
          sudo mv Samra.app /Applications/

      - name: Execute Robust AppleScript GUI Automation
        run: |
          killall Samra || true
          open /Applications/Samra.app
          sleep 5

          osascript -e '
            tell application "System Events"
              tell process "Samra"
                set frontmost to true
                delay 1.5
                
                # 1. Clear the Welcome Screen
                key code 48 -- (Press Tab to highlight "Open Assets File")
                delay 0.5
                key code 49 -- (Press Spacebar to execute click)
                delay 2
                
                # 2. Select the local Assets.car file
                keystroke "G" using {command down, shift down}
                delay 1.5
                keystroke "'"$PWD"'/Assets.car"
                delay 1
                key code 36 -- (Press Enter to confirm directory)
                delay 1.5
                key code 36 -- (Press Enter to load file)
                
                # Give the virtual system breathing room to build the file catalog tree
                delay 10 

                # 3. Handle Workspace Filtering & Asset Selection
                # Open the search field
                keystroke "f" using command down
                delay 1.5
                
                # Type out the asset keyword
                keystroke "watermark"
                delay 3 -- Wait for the interface to filter down to the entry

                # NAVIGATE PAST SYSTEM SELECTION LIMITS:
                # Tab moves focus out of the search field and drops it directly onto the isolated search result
                key code 48 -- (Press Tab)
                delay 0.5
                key code 49 -- (Press Spacebar to select the watermark row)
                delay 1.5

                # 4. Trigger the Edit Action
                # Tab twice more to hop over to the "Edit" button in the right details panel
                key code 48 -- (Press Tab)
                delay 0.5
                key code 48 -- (Press Tab)
                delay 0.5
                key code 49 -- (Press Spacebar to click "Edit")
                delay 2.5

                # 5. Inject the Replacement Image File
                keystroke "G" using {command down, shift down}
                delay 1.5
                keystroke "'"$PWD"'/replacement_watermark.png"
                delay 1
                key code 36 -- (Confirm source path input)
                delay 1.5
                key code 36 -- (Confirm selection in picker)
                delay 4

                # 6. Save modifications directly back to the .car file structure
                keystroke "s" using command down
                delay 2
              end tell
            end tell
          '

      - name: Export Finished File Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebuilt-asset-catalog
          path: Assets.car
