name: Automate Samra Asset Replacement
on: [workflow_dispatch]

jobs:
  replace-asset:
    runs-on: macos-14
    steps:
      - name: Checkout Repository Files
        uses: actions/checkout@v4

      - name: Download and Install Latest Samra App
        run: |
          curl -L -o Samra.zip https://github.com
          unzip Samra.zip
          sudo mv Samra.app /Applications/

      - name: Execute Clipboard-Safe AppleScript GUI Automation
        run: |
          killall Samra || true
          open /Applications/Samra.app
          sleep 5

          # 1. Load the original file path directly into the macOS clipboard
          echo -n "$PWD/Assets.car" | pbcopy

          osascript -e '
            tell application "System Events"
              tell process "Samra"
                set frontmost to true
                delay 1.5
                
                # 2. Clear the Welcome Screen
                key code 48 -- (Press Tab to highlight "Open Assets File")
                delay 0.5
                key code 49 -- (Press Spacebar to click it)
                delay 2
                
                # 3. Paste the Assets.car path from clipboard
                keystroke "G" using {command down, shift down}
                delay 2
                keystroke "v" using command down -- (Paste the path)
                delay 2 -- Give macOS plenty of time to render the pasted text
                key code 36 -- (Press Enter to confirm path)
                delay 2
                key code 36 -- (Press Enter to open file)
                
                # Extended pause to completely generate large catalog elements
                delay 12 

                # 4. Search and select "watermark"
                tell window 1
                  keystroke "f" using command down
                  delay 1.5
                  keystroke "watermark"
                  delay 4 -- Let search fully filter the list view

                  # Tab over to the filtered entry and highlight it
                  key code 48 -- (Press Tab)
                  delay 1
                  key code 49 -- (Press Spacebar to select item)
                  delay 2

                  # Tab over to the details pane "Edit" button
                  key code 48 -- (Press Tab)
                  delay 0.5
                  key code 48 -- (Press Tab)
                  delay 0.5
                  key code 49 -- (Press Spacebar to click "Edit")
                  delay 3
                end tell

                # 5. Load the replacement image path into clipboard dynamically
                do shell script "echo -n " & quoted form of "'"$PWD"'/replacement_watermark.png" & " | pbcopy"
                delay 1

                # 6. Paste the replacement image path
                keystroke "G" using {command down, shift down}
                delay 2
                keystroke "v" using command down -- (Paste the image path)
                delay 2
                key code 36 -- (Confirm path input)
                delay 2
                key code 36 -- (Confirm file pick)
                delay 5 -- Allow Samra to complete internal database swap

                # 7. Save modifications back to the .car file structure
                keystroke "s" using command down
                delay 3
              end tell
            end tell
          '

      - name: Export Finished File Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebuilt-asset-catalog
          path: Assets.car
