name: Automate Samra Asset Replacement
on: [workflow_dispatch]

jobs:
  replace-asset:
    runs-on: macos-14
    steps:
      - name: Checkout Repository Files
        uses: actions/checkout@v4

      - name: Download and Install Samra App
        run: |
          curl -L -o Samra.zip https://github.com/NSAntoine/Samra/releases/download/1.4.1/Samra.app.zip
          unzip Samra.zip
          sudo mv Samra.app /Applications/

      - name: Execute Robust AppleScript GUI Automation
        run: |
          killall Samra || true
          open /Applications/Samra.app
          sleep 5

          osascript -e '
            tell application "System Events"
              tell process "Samra"
                set frontmost to true
                delay 1.5
                
                # 1. Bypass Welcome Screen via Keyboard Navigation
                # Tab moves focus to the first interactive menu element ("Open Assets File")
                key code 48 -- (Press Tab)
                delay 0.5
                key code 49 -- (Press Spacebar to click it)
                delay 2
                
                # 2. Open standard macOS panel navigation to find Assets.car
                keystroke "G" using {command down, shift down}
                delay 1.5
                keystroke "'"$PWD"'/Assets.car"
                delay 1
                key code 36 -- (Press Enter to apply location)
                delay 1.5
                key code 36 -- (Press Enter again to open the file)
                
                # Allow time for a large catalog to fully generate its UI
                delay 10 

                # 3. Target the main application workspace window
                tell window 1
                  # Open search bar and type "watermark"
                  keystroke "f" using command down
                  delay 1
                  keystroke "watermark"
                  delay 3 -- Let search indexing filter the row elements

                  # Highlight and select the structural element row
                  set targetRow to static text "watermark"
                  select targetRow
                  delay 1.5

                  # Click the visual "Edit" button in the details panel
                  click button "Edit"
                  delay 2.5
                end tell

                # 4. Handle the file picker sheet for the replacement image
                keystroke "G" using {command down, shift down}
                delay 1.5
                keystroke "'"$PWD"'/replacement_watermark.png"
                delay 1
                key code 36 -- (Confirm path input)
                delay 1.5
                key code 36 -- (Confirm target selection)
                delay 4

                # 5. Save the corrected data modifications
                keystroke "s" using command down
                delay 2
              end tell
            end tell
          '

      - name: Export Finished File Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebuilt-asset-catalog
          path: Assets.car
