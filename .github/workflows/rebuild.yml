name: Automate Samra Asset Replacement
on: [workflow_dispatch]

jobs:
  replace-asset:
    runs-on: macos-14
    steps:
      - name: Checkout Repository Files
        uses: actions/checkout@v4

      - name: Download and Install Latest Samra App
        run: |
          curl -L -o Samra.zip https://github.com/NSAntoine/Samra/releases/download/1.4.1/Samra.app.zip
          unzip Samra.zip
          sudo mv Samra.app /Applications/

      - name: Execute Native Data Injection
        run: |
          killall Samra || true
          open /Applications/Samra.app
          sleep 5

          # Copy the binary file destination to clipboard
          echo -n "$PWD/Assets.car" | pbcopy

          osascript -e '
            tell application "System Events"
              tell process "Samra"
                set frontmost to true
                delay 1.5
                
                # 1. Open the original .car file using the welcome layout interface
                key code 48 -- (Tab over to highlight "Open Assets File")
                delay 0.5
                key code 49 -- (Press Spacebar to click it)
                delay 2
                
                keystroke "G" using {command down, shift down}
                delay 2
                keystroke "v" using command down -- (Paste original .car location)
                delay 2
                key code 36 -- (Press Enter to confirm location)
                delay 1.5
                key code 36 -- (Press Enter to open file)
                
                # Wait for the catalog array grid to populate completely
                delay 10 

                # 2. Query and isolate the exact image row using search
                tell window 1
                  keystroke "f" using command down
                  delay 1.5
                  keystroke "watermark"
                  delay 4 -- Give search time to isolate the watermark entry

                  # Navigate focus to the filtered result row
                  key code 48 -- (Press Tab)
                  delay 1
                  key code 49 -- (Press Spacebar to highlight the target row element)
                  delay 2
                end tell

                # 3. USE DIRECT DATA PATH ASSIGNMENT (Bypasses the buggy file picker sheet entirely)
                # Instead of hitting Edit and risking window confusion, copy the replacement image path 
                # and paste it while the item row is selected.
                do shell script "echo -n " & quoted form of "'"$PWD"'/replacement_watermark.png" & " | pbcopy"
                delay 1.5

                # Click Edit to open the configuration sheet
                tell window 1
                  key code 48 -- (Press Tab)
                  delay 0.5
                  key code 48 -- (Press Tab)
                  delay 0.5
                  key code 49 -- (Press Spacebar to trigger Edit modal panel)
                  delay 3
                end tell

                # Paste the new path into the native system dialog panel cleanly
                keystroke "G" using {command down, shift down}
                delay 2
                keystroke "v" using command down -- (Paste the target replacement path)
                delay 2.5
                key code 36 -- (Confirm the text path selection)
                delay 2
                
                # Use a forced alternative click selector (Keystroke Enter) to lock down the sheet submission
                key code 36
                delay 6 -- Extended hold to ensure data blocks rewrite into the binary file completely

                # 4. Force a clean database compile save
                keystroke "s" using command down
                delay 4
              end tell
            end tell
          '

      - name: Verify Output Modification
        run: |
          echo "=== SHA-256 CHECK ==="
          shasum -a 256 Assets.car

      - name: Export Finished File Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebuilt-asset-catalog
          path: Assets.car
